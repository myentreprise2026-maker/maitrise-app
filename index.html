<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAÎTRISE — Ligue Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#14161a;
    --ink-2:#1b1e25;
    --card:#20242c;
    --card-hi:#262b34;
    --line: rgba(243,241,234,0.08);
    --line-strong: rgba(243,241,234,0.16);
    --chalk:#f3f1ea;
    --chalk-dim:#a8acb5;
    --muted:#9aa0ab;
    --energy:#ff6a3d;
    --energy-dim: rgba(255,106,61,0.16);
    --muscle:#2fd4c0;
    --muscle-dim: rgba(47,212,192,0.16);
    --bronze:#b08d57;
    --argent:#c7cdd6;
    --or:#e8b93b;
    --maitre:#e4572e;
    --legende-a:#f2c744;
    --legende-b:#8b5cf6;
    --danger:#ef4444;
    --radius: 14px;
    --font-display: 'Bebas Neue', Impact, sans-serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,106,61,0.10), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(47,212,192,0.08), transparent 55%),
      var(--ink);
    color:var(--chalk);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--energy); color:#14161a; }
  a{color:inherit;}
  button{font-family:var(--font-body); cursor:pointer;}
  input,select,textarea{font-family:var(--font-body);}

  .hidden{display:none !important;}

  /* ---------- Track lane background texture ---------- */
  .lane-texture{
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 10px, transparent 10px 24px);
  }

  /* ---------- Top scoreboard bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px;
    background: rgba(20,22,26,0.85);
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand .mark{
    width:34px; height:34px; border-radius:8px;
    background: linear-gradient(135deg, var(--energy), var(--maitre));
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-size:20px; color:#14161a;
    transform: rotate(-4deg);
  }
  .brand h1{
    font-family:var(--font-display); letter-spacing:1.5px; font-size:24px; margin:0;
    font-weight:400;
  }
  .brand .tagline{ font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:-2px;}

  .topbar-right{ display:flex; align-items:center; gap:14px; }
  .pill{
    display:flex; align-items:center; gap:8px;
    background:var(--card); border:1px solid var(--line);
    padding:6px 12px; border-radius:100px; font-size:13px;
  }
  .pill strong{ font-family:var(--font-mono); color:var(--energy); }
  .btn-logout{
    background:transparent; border:1px solid var(--line-strong); color:var(--muted);
    padding:7px 12px; border-radius:100px; font-size:12px;
  }
  .btn-logout:hover{ color:var(--chalk); border-color:var(--chalk-dim); }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex; gap:4px; padding:0 22px; border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  .tab{
    background:none; border:none; color:var(--muted); padding:14px 16px;
    font-size:13px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    border-bottom:2px solid transparent; white-space:nowrap;
  }
  .tab.active{ color:var(--chalk); border-bottom-color:var(--energy); }
  .tab:hover{ color:var(--chalk); }

  .view{ max-width:1180px; margin:0 auto; padding:28px 22px 80px; }

  /* ---------- Login screen ---------- */
  .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .login-card{
    width:100%; max-width:420px;
    background:var(--card);
    border:1px solid var(--line); border-radius:20px;
    padding:34px 30px;
    position:relative; overflow:hidden;
  }
  .login-card::before{
    content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px;
    background: radial-gradient(circle, var(--energy-dim), transparent 70%);
  }
  .login-title{ font-family:var(--font-display); font-size:38px; letter-spacing:1px; margin:0 0 4px; position:relative;}
  .login-sub{ color:var(--muted); font-size:13px; margin:0 0 26px; position:relative; line-height:1.5;}
  .field{ margin-bottom:14px; position:relative; }
  .field label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:6px; }
  .field input{
    width:100%; background:var(--ink-2); border:1px solid var(--line-strong); color:var(--chalk);
    padding:11px 13px; border-radius:10px; font-size:14px; outline:none;
  }
  .field input:focus{ border-color:var(--energy); }
  .btn-primary{
    width:100%; background:var(--energy); color:#14161a; border:none;
    padding:13px; border-radius:10px; font-weight:800; font-size:14px;
    letter-spacing:0.5px; text-transform:uppercase; margin-top:6px;
  }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; }
  .switch-mode{ text-align:center; margin-top:16px; font-size:13px; color:var(--muted); }
  .switch-mode button{ background:none; border:none; color:var(--energy); font-weight:700; padding:0; }
  .auth-error{ background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; padding:9px 12px; border-radius:8px; font-size:12.5px; margin-bottom:14px; }
  .disclaimer{ font-size:11px; color:var(--muted); margin-top:18px; line-height:1.5; border-top:1px solid var(--line); padding-top:14px;}

  /* onboarding chips */
  .chip-group{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    background:var(--ink-2); border:1px solid var(--line-strong); color:var(--muted);
    padding:8px 13px; border-radius:100px; font-size:12.5px; font-weight:600;
  }
  .chip.selected{ background:var(--energy-dim); border-color:var(--energy); color:var(--energy); }
  .chip.selected.muscle-flavor{ background:var(--muscle-dim); border-color:var(--muscle); color:var(--muscle); }

  /* ---------- Cards / grid ---------- */
  .grid-2{ display:grid; grid-template-columns: 340px 1fr; gap:22px; }
  @media(max-width:860px){ .grid-2{ grid-template-columns:1fr; } }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px;
  }
  .card h3{ font-family:var(--font-display); letter-spacing:0.5px; font-size:20px; font-weight:400; margin:0 0 14px;}
  .section-title{
    font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin:0 0 12px;
  }

  /* ---------- Rank badge (signature element) ---------- */
  .rank-badge-wrap{ display:flex; flex-direction:column; align-items:center; text-align:center; }
  .rank-badge{
    width:110px; height:126px; position:relative; margin-bottom:14px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-size:15px; letter-spacing:1px;
  }
  .rank-name{ font-family:var(--font-display); font-size:26px; letter-spacing:1px; margin:0; }
  .rank-sub{ color:var(--muted); font-size:12px; margin:2px 0 18px; }

  .track{
    width:100%; height:14px; border-radius:100px; background:var(--ink-2);
    border:1px solid var(--line-strong); position:relative; overflow:hidden;
  }
  .track-fill{
    height:100%; border-radius:100px;
    background: repeating-linear-gradient(90deg, var(--energy) 0 10px, #ff8a63 10px 20px);
    transition: width 0.6s cubic-bezier(.2,.9,.3,1);
  }
  .track-labels{ display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:7px; font-family:var(--font-mono); }

  .stat-row{ display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--line); }
  .stat-row:last-child{ border-bottom:none; }
  .stat-row .k{ color:var(--muted); font-size:12.5px; }
  .stat-row .v{ font-family:var(--font-mono); font-size:14px; }

  /* ---------- Exercise / challenge cards ---------- */
  .challenge-list{ display:flex; flex-direction:column; gap:12px; }
  .ex-card{
    background:var(--ink-2); border:1px solid var(--line-strong); border-radius:12px;
    padding:16px 18px; display:flex; align-items:center; gap:16px;
  }
  .ex-icon{
    width:44px; height:44px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--energy-dim); color:var(--energy);
  }
  .ex-icon.muscle{ background:var(--muscle-dim); color:var(--muscle); }
  .ex-body{ flex:1; min-width:0; }
  .ex-name{ font-weight:700; font-size:14.5px; margin:0 0 2px; }
  .ex-target{ font-family:var(--font-mono); font-size:12.5px; color:var(--energy); }
  .ex-meta{ font-size:11.5px; color:var(--muted); margin-top:3px; }
  .ex-actions{ flex-shrink:0; display:flex; gap:8px; align-items:center;}
  .btn-small{
    background:var(--card-hi); border:1px solid var(--line-strong); color:var(--chalk);
    padding:8px 13px; border-radius:8px; font-size:12.5px; font-weight:700;
  }
  .btn-small.go{ background:var(--energy); color:#14161a; border:none; }
  .btn-small:disabled{ opacity:0.4; cursor:not-allowed; }
  .badge-done{ font-size:11px; color:var(--muscle); font-weight:700; display:flex; align-items:center; gap:5px;}

  .toolbar{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; justify-content:space-between;}
  .seg{ display:flex; background:var(--ink-2); border:1px solid var(--line-strong); border-radius:100px; padding:3px; }
  .seg button{ background:none; border:none; color:var(--muted); padding:7px 14px; border-radius:100px; font-size:12.5px; font-weight:700; }
  .seg button.active{ background:var(--energy); color:#14161a; }

  /* ---------- Recipes ---------- */
  .recipe-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px; }
  .recipe-card{ background:var(--ink-2); border:1px solid var(--line-strong); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }
  .recipe-top{ padding:16px 18px 10px; }
  .recipe-tag{ display:inline-block; font-size:10.5px; text-transform:uppercase; letter-spacing:1px; padding:3px 9px; border-radius:100px; background:var(--muscle-dim); color:var(--muscle); font-weight:700; margin-bottom:8px;}
  .recipe-tag.perte{ background:var(--energy-dim); color:var(--energy); }
  .recipe-name{ font-weight:800; font-size:15.5px; margin:0 0 4px; }
  .recipe-kcal{ font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  .recipe-body{ padding:0 18px 18px; font-size:12.5px; color:var(--chalk-dim); line-height:1.6; flex:1; }
  .recipe-body b{ color:var(--chalk); }
  .recipe-body ul{ margin:6px 0; padding-left:18px; }

  /* ---------- Leaderboard ---------- */
  .board{ width:100%; border-collapse:collapse; }
  .board th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); padding:10px 12px; border-bottom:1px solid var(--line-strong); }
  .board td{ padding:12px; border-bottom:1px solid var(--line); font-size:13.5px; }
  .board tr.me{ background:rgba(255,106,61,0.08); }
  .rank-num{ font-family:var(--font-mono); font-weight:700; width:34px; display:inline-block; }
  .rank-num.top1{ color:var(--or); } .rank-num.top2{ color:var(--argent);} .rank-num.top3{ color:var(--bronze);}
  .obj-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; }

  /* ---------- Coach chat ---------- */
  .coach-fab{
    position:fixed; bottom:22px; right:22px; z-index:50;
    width:60px; height:60px; border-radius:50%;
    background: linear-gradient(135deg, var(--energy), var(--maitre));
    border:none; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 10px 30px rgba(255,106,61,0.35);
  }
  .coach-panel{
    position:fixed; bottom:96px; right:22px; z-index:50;
    width:360px; max-width:calc(100vw - 32px); height:520px; max-height:70vh;
    background:var(--card); border:1px solid var(--line-strong); border-radius:16px;
    display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .coach-head{ padding:14px 16px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .coach-head h4{ margin:0; font-family:var(--font-display); font-size:18px; letter-spacing:0.5px; font-weight:400;}
  .coach-head .status{ font-size:10.5px; color:var(--muscle); text-transform:uppercase; letter-spacing:1px;}
  .coach-close{ background:none; border:none; color:var(--muted); font-size:18px; }
  .coach-msgs{ flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
  .msg{ max-width:85%; padding:9px 12px; border-radius:12px; font-size:13px; line-height:1.5; }
  .msg.coach{ background:var(--ink-2); align-self:flex-start; border-bottom-left-radius:3px; }
  .msg.user{ background:var(--energy); color:#14161a; align-self:flex-end; border-bottom-right-radius:3px; font-weight:600;}
  .msg.sys{ align-self:center; color:var(--muted); font-size:11px; font-style:italic; }
  .coach-input-row{ display:flex; gap:8px; padding:12px; border-top:1px solid var(--line); }
  .coach-input-row input{ flex:1; background:var(--ink-2); border:1px solid var(--line-strong); color:var(--chalk); padding:10px 12px; border-radius:100px; font-size:13px; outline:none;}
  .coach-input-row input:focus{ border-color:var(--energy); }
  .coach-send{ background:var(--energy); border:none; color:#14161a; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .coach-send:disabled{ opacity:0.4; }
  .typing{ display:flex; gap:3px; padding:6px 0;}
  .typing span{ width:6px; height:6px; border-radius:50%; background:var(--muted); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:0.15s;} .typing span:nth-child(3){ animation-delay:0.3s;}
  @keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:0.5;} 30%{ transform:translateY(-4px); opacity:1;} }

  .empty{ text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
  .toast{
    position:fixed; top:80px; left:50%; transform:translateX(-50%); z-index:60;
    background:var(--card); border:1px solid var(--muscle); color:var(--chalk);
    padding:12px 20px; border-radius:10px; font-size:13px; font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
  }
  /* ---------- Arène : parcours visuel des rangs ---------- */
  .rank-path{
    display:flex; gap:0; overflow-x:auto; padding:24px 6px 14px; position:relative;
    -webkit-overflow-scrolling:touch;
  }
  .rank-path::before{
    content:''; position:absolute; top:46px; left:26px; right:26px; height:2px;
    background:var(--line-strong); z-index:0;
  }
  .rank-node-wrap{ flex:0 0 auto; width:96px; text-align:center; position:relative; z-index:1; }
  .rank-node{
    width:48px; height:48px; border-radius:50%; margin:0 auto 10px;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:15px; border:2px solid var(--line-strong);
    background:var(--ink); color:var(--muted); transition:transform 0.2s;
  }
  .rank-node.done{ background:var(--tier-color); border-color:var(--tier-color); color:#14161a; }
  .rank-node.current{
    background:var(--tier-color); border-color:var(--tier-color); color:#14161a;
    transform:scale(1.3); box-shadow:0 0 0 7px var(--energy-dim);
  }
  .rank-node-label{ font-size:11px; font-weight:700; line-height:1.3; }
  .rank-node.current ~ .rank-node-label, .rank-node-wrap:has(.current) .rank-node-label{ color:var(--energy); }
  .rank-node-pts{ font-family:var(--font-mono); font-size:10.5px; color:var(--muted); margin-top:2px; }

  /* ---------- Arène : badges du jour ---------- */
  .day-badge{
    width:56px; height:56px; border-radius:50%; margin:0 auto 12px;
    display:flex; align-items:center; justify-content:center;
    border:2px solid var(--line-strong); background:var(--ink);
  }
  .day-card.today .day-badge{
    background:linear-gradient(145deg, var(--energy), var(--maitre)); border-color:transparent;
    color:#14161a; box-shadow:0 8px 20px -6px rgba(255,106,61,0.5);
  }
  .day-card.locked .day-badge{ color:var(--muted); }
  .day-badge-num{ font-family:var(--font-mono); font-size:20px; font-weight:800; }


  /* ---------- Arène : calendrier hebdomadaire ---------- */
  .week-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:12px; }
  .day-card{
    background:var(--ink-2); border:1px solid var(--line-strong); border-radius:12px;
    padding:16px 14px; text-align:center; position:relative;
  }
  .day-card.today{ border-color:var(--energy); background:var(--energy-dim); }
  .day-card.locked{ opacity:0.55; }
  .day-label{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
  .day-card.today .day-label{ color:var(--energy); font-weight:700; }
  .day-lock{ color:var(--muted); margin:6px 0; }
  .day-status{ font-size:11px; color:var(--muted); margin-top:6px; }
  .day-status.unlocked{ color:var(--muscle); font-weight:700; }
  .footer-reset{ text-align:center; margin-top:30px; }
  .footer-reset button{ background:none; border:none; color:var(--muted); font-size:11.5px; text-decoration:underline; }

  /* ---------- Suivi GPS en direct ---------- */
  .gps-panel{
    position:fixed; bottom:96px; left:22px; z-index:50; width:290px; max-width:calc(100vw - 32px);
    background:var(--card); border:1px solid var(--line-strong); border-radius:16px; padding:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .gps-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .gps-head h4{ margin:0; font-family:var(--font-display); font-size:18px; font-weight:400; letter-spacing:0.5px; }
  .gps-stats-row{ display:flex; gap:10px; margin-bottom:12px; }
  .gps-stat{ flex:1; text-align:center; background:var(--ink-2); border-radius:10px; padding:10px 6px; }
  .gps-stat .big{ font-family:var(--font-mono); font-size:19px; font-weight:800; }
  .gps-stat .label{ font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px;}
  .gps-message{ background:var(--energy-dim); color:var(--energy); padding:10px 12px; border-radius:10px; font-size:12.5px; font-weight:700; text-align:center; margin-bottom:14px; line-height:1.4; }
  .gps-actions{ display:flex; gap:8px; }
  .gps-fab{
    position:fixed; bottom:22px; left:22px; z-index:50;
    background:var(--muscle); color:#14161a; border:none; border-radius:100px;
    padding:12px 18px; font-weight:800; font-size:13px; display:flex; align-items:center; gap:8px;
    box-shadow:0 10px 30px rgba(47,212,192,0.35);
  }

</style>
</head>
<body>

<div id="root"></div>

<script>

function pickExercisesForTime(pool, targetMin){
  if(pool.length===0) return [];
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  const chosen = [];
  let total = 0;
  for(const ex of shuffled){
    const est = ex.estMin || 3;
    if(chosen.length>0 && total + est > targetMin + 5) continue;
    chosen.push(ex);
    total += est;
    if(total>=targetMin) break;
  }
  if(chosen.length===0) chosen.push(shuffled[0]);
  return chosen;
}

/* =========================================================
   LOGIQUE D'AJUSTEMENT AU POIDS
   ========================================================= */
const NIVEAU_FACTOR = { facile:0.75, moyen:1, difficile:1.3 };

function computeIMC(poids, tailleCm){
  if(!tailleCm || tailleCm<=0) return null;
  const m = tailleCm/100;
  return poids / (m*m);
}
function imcCategory(imc){
  if(imc==null) return 'normal';
  if(imc < 18.5) return 'insuffisance';
  if(imc < 25) return 'normal';
  if(imc < 30) return 'surpoids';
  return 'obesite';
}
function suggestNiveau(age, imc){
  const cat = imcCategory(imc);
  if(cat==='obesite' || cat==='insuffisance') return 'facile';
  if(age!=null && (age < 14 || age > 60)) return 'facile';
  if(cat==='surpoids' || (age!=null && age > 45)) return 'moyen';
  return 'moyen';
}
function safetyFactor(u){
  const imc = computeIMC(u.poids, u.taille);
  const cat = imcCategory(imc);
  let f = 1;
  if(cat==='obesite' || cat==='insuffisance') f *= 0.85;
  if(u.age!=null && (u.age < 14 || u.age > 60)) f *= 0.85;
  return f;
}
function adjustReps(base, poids, u){
  const factor = Math.pow(60/poids, 0.75);
  const niveau = (u && NIVEAU_FACTOR[u.niveau]) || 1;
  const safety = u ? safetyFactor(u) : 1;
  return Math.max(5, Math.round(base*factor*niveau*safety));
}
function adjustDurationDown(base, poids, u){
  const factor = Math.pow(60/poids, 0.6);
  const niveau = (u && NIVEAU_FACTOR[u.niveau]) || 1;
  const safety = u ? safetyFactor(u) : 1;
  return Math.max(15, Math.round(base*factor*niveau*safety));
}
function adjustTimeAllowed(baseMin, poids, u){
  const factor = Math.pow(poids/60, 0.5);
  const niveau = (u && NIVEAU_FACTOR[u.niveau]) || 1;
  const safety = u ? safetyFactor(u) : 1;
  return Math.round(baseMin*factor/(niveau*safety)*10)/10;
}
function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}
function computeTarget(ex, poids, u){
  if(ex.type==='reps') return {display: adjustReps(ex.base, poids, u)+' répétitions'};
  if(ex.type==='duration'){
    if(ex.id==='yoga') return {display: Math.round(ex.base/60)+' min (identique pour tous)'};
    const s = adjustDurationDown(ex.base, poids, u);
    return {display: s>=60 ? Math.round(s/6)/10+' min' : s+' s'};
  }
  if(ex.type==='distance'){
    const t = adjustTimeAllowed(ex.baseTimeMin, poids, u);
    return {display: ex.base+' '+ex.unit+' en '+t+' min max'};
  }
  return {display:''};
}
function levelIndexForPoints(pts){
  let idx=0;
  for(let i=0;i<LEVELS.length;i++){ if(pts>=LEVELS[i].min) idx=i; }
  return idx;
}
function eligiblePool(u){
  const equip = u.equipements || [];
  const lieu = u.lieuPref || 'maison';
  const base = EXERCISES.filter(e =>
    u.objectifs.some(o=>e.obj.includes(o)) &&
    (lieu==='les_deux' || e.lieu.includes(lieu)) &&
    (!e.equip || equip.includes(e.equip))
  );
  const imc = computeIMC(u.poids, u.taille);
  const cat = imcCategory(imc);
  const fragile = cat==='obesite' || cat==='insuffisance' || (u.age!=null && (u.age < 14 || u.age > 60));
  if(!fragile) return base;
  const gentle = base.filter(e => e.impact !== 'high');
  return gentle.length ? gentle : base;
}
function todayKey(){ return new Date().toISOString().slice(0,10); }
function ensureDailyChallenge(u){
  if(u.dailyDate !== todayKey()){
    u.dailyDate = todayKey();
    const pool = eligiblePool(u);
    const base = pool.length ? pool : EXERCISES.filter(e=>!e.equip);
    const chosen = pickExercisesForTime(base, u.tempsDispo || 20);
    u.dailyExercises = chosen.map(e=>e.id);
    if(!u.doneTodayDate || u.doneTodayDate!==todayKey()){ u.doneToday = {}; u.doneTodayDate = todayKey(); }
  }
}

  const vp = document.getElementById('viewport');
  if(state.view==='dashboard') vp.innerHTML = renderDashboard(u, lvl, next, progressPct);
  if(state.view==='defis') vp.innerHTML = renderDefis(u);
  if(state.view==='arene') vp.innerHTML = renderArene(u, lvl, next);
  if(state.view==='recettes') vp.innerHTML = renderRecettes(u);
  if(state.view==='classement') vp.innerHTML = renderClassement(u);

  attachHandlers(u);
}

function renderDefis(u){

    const target = computeTarget(ex, u.poids, u);
    const done = !!(u.doneToday && u.doneToday[ex.id]);
    return `
    <div class="ex-card">
      <div class="ex-icon ${ex.icon}">${iconSvg(ex.icon==='muscle'?'dumbbell':'flame')}</div>
      <div class="ex-body">
        <p class="ex-name">${ex.nom}${ex.equip ? ` <span style="color:var(--muted); font-weight:400; font-size:11px;">(nécessite : ${EQUIPEMENTS.find(q=>q.id===ex.equip).label})</span>` : ''}</p>
        <p class="ex-target">${target.display}</p>
        <p class="ex-meta">${ex.desc}</p>
      </div>
      <div class="ex-actions">
        ${done
          ? `<span class="badge-done">${iconSvg('medal')} Validé</span>`
          : (ex.type==='distance'
              ? (state.gps && state.gps.exId===ex.id
                  ? `<span class="badge-done" style="color:var(--muscle);">📍 Suivi en cours</span>`
                  : `<button class="btn-small" data-swap="${ex.id}" title="Remplacer par un autre exercice">⇄</button><button class="btn-small" data-gps-start="${ex.id}">📍 Suivi GPS</button><button class="btn-small go" data-validate="${ex.id}">Terminé →</button>`)
              : `<button class="btn-small" data-swap="${ex.id}" title="Remplacer par un autre exercice">⇄</button><button class="btn-small go" data-validate="${ex.id}">Terminé →</button>`)
        }
      </div>
    </div>`;
  }).join('');

  const allDone = list.length>0 && list.every(ex => u.doneToday && u.doneToday[ex.id]);
  const bonusPool = eligiblePool(u).filter(e => !u.dailyExercises.includes(e.id));
  const totalMin = list.reduce((sum,ex)=> sum + (ex.estMin||3), 0);

  const bonusSection = allDone ? `
    <div class="card" style="margin-top:20px; border-color:var(--muscle);">
      <h3 style="margin-bottom:6px;">🏆 Défis du jour terminés !</h3>
      <p style="color:var(--chalk-dim); font-size:13px; margin:0 0 14px;">Envie de continuer ? Ajoute un défi bonus sur ce que tu veux travailler en plus — toujours ajusté à ton poids, toujours validé par ton coach, toujours des points en plus.</p>
      ${state.bonusPickerOpen ? `
        <div class="chip-group">
          ${bonusPool.length ? bonusPool.map(e=>`<button type="button" class="chip" data-add-bonus="${e.id}">${e.nom}</button>`).join('') : '<span style="color:var(--muted); font-size:12.5px;">Plus aucun exercice disponible avec ton équipement/lieu actuel.</span>'}
        </div>
      ` : `<button class="btn-small go" id="btnOpenBonus">+ Ajouter un défi bonus</button>`}
    </div>
  ` : '';

  return `
    <div class="toolbar">
      <div>
        <h3 style="margin:0;">Défis du jour</h3>
        <p style="color:var(--muted); font-size:12.5px; margin:4px 0 0;">~${totalMin} min au total — généré pour tenir dans ton temps disponible (${u.tempsDispo||20} min/jour). Pas d'équipement ? Utilise ⇄ pour échanger un exercice.</p>
      </div>
      <div class="seg">
        <button class="${u.lieuPref!=='exterieur' && u.lieuPref!=='les_deux'?'active':''}" data-lieu="maison">Maison</button>
        <button class="${u.lieuPref==='exterieur'?'active':''}" data-lieu="exterieur">Extérieur</button>
        <button class="${u.lieuPref==='les_deux'?'active':''}" data-lieu="les_deux">Les deux</button>
      </div>
    </div>
    <div class="section-title">Temps disponible par jour</div>
    <div class="chip-group" style="margin-bottom:20px;">
      ${TEMPS_OPTIONS.map(t=>`<button type="button" class="chip ${((u.tempsDispo||20)===t)?'selected':''}" data-set-temps="${t}">${t} min</button>`).join('')}

    <div class="section-title">Niveau</div>
    <div class="chip-group" style="margin-bottom:20px;">
      <button type="button" class="chip ${(u.niveau||'moyen')==='facile'?'selected':''}" data-set-niveau="facile">Facile</button>
      <button type="button" class="chip ${(u.niveau||'moyen')==='moyen'?'selected':''}" data-set-niveau="moyen">Moyen</button>
      <button type="button" class="chip ${(u.niveau||'moyen')==='difficile'?'selected':''}" data-set-niveau="difficile">Difficile</button>

    <div class="section-title">Équipement disponible (facultatif)</div>

    <div class="chip-group" style="margin-bottom:20px;">
      ${EQUIPEMENTS.map(eq=>`<button type="button" class="chip ${equip.includes(eq.id)?'selected':''}" data-toggle-equip="${eq.id}">${eq.label}</button>`).join('')}

  `;
}

function renderArene(u, lvl, next){
  const curIdx = levelIndexForPoints(u.points);
  const nodes = LEVELS.map((l,i)=>{
    const status = i<curIdx ? 'done' : i===curIdx ? 'current' : 'locked';
    const inner = status==='locked' ? iconSvg('lock') : status==='current' ? '★' : '✓';
    return `
    <div class="rank-node-wrap">
      <div class="rank-node ${status}" style="--tier-color:${l.color};">${inner}</div>
      <div class="rank-node-label" style="${status==='current'?'color:var(--energy);':''}">${l.name}</div>
      <div class="rank-node-pts">${l.min} pts</div>
    </div>`;
  }).join('');

  const dayNames = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const todayCount = (u.dailyExercises||[]).length;
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date();
    d.setDate(d.getDate()+i);
    const label = i===0 ? 'Aujourd\'hui' : dayNames[d.getDay()];
    days.push({i, label});
  }
  const weekCards = days.map(day=>{
    if(day.i===0){
      return `
      <div class="day-card today">
        <div class="day-label">${day.label}</div>
        <div class="day-badge"><span class="day-badge-num">${todayCount}</span></div>
        <div class="day-status unlocked">défis débloqués</div>
      </div>`;
    }
    return `
    <div class="day-card locked">
      <div class="day-label">${day.label}</div>
      <div class="day-badge">${iconSvg('lock')}</div>
      <div class="day-status">dans ${day.i} jour${day.i>1?'s':''}</div>
    </div>`;
  }).join('');

  return `
    <h3>Progression des rangs</h3>
    <p style="color:var(--muted); font-size:12.5px; margin:-8px 0 4px;">Ton parcours dans la ligue — voici combien de points il faut pour chaque rang.</p>
    <div class="card" style="padding-top:6px;">
      <div class="rank-path">${nodes}</div>
    </div>

    <h3 style="margin-top:28px;">Cette semaine</h3>
    <p style="color:var(--muted); font-size:12.5px; margin:-8px 0 18px;">Un nouveau défi se débloque chaque jour. Impossible de voir les exercices à l'avance — reviens demain !</p>
    <div class="week-grid">${weekCards}</div>
  `;
}

function renderRecettes(u){
  const filtre = state.recetteFiltre || 'tous';
  const filtered = filtre==='tous' ? RECIPES : RECIPES.filter(r=>r.type===filtre);

  const cardHtml = r => `
    <div class="recipe-card">
      <div class="recipe-top">
        <span class="recipe-tag ${r.tag==='perte'?'perte':''}">${OBJ_LABEL[r.tag]}</span>
        <p class="recipe-name">${r.nom}</p>
        <span class="recipe-kcal">${iconSvg('chef')} ~${r.kcal} kcal</span>
      </div>
      <div class="recipe-body">
        <b>Ingrédients</b>
        <ul>${r.ing.map(i=>`<li>${i}</li>`).join('')}</ul>
        <b>Préparation</b>
        <p style="margin:4px 0 0;">${r.etapes}</p>
      </div>
    </div>
  `;

  let content;
  if(filtre==='tous'){
    content = RECIPE_TYPES.map(t=>{
      const items = RECIPES.filter(r=>r.type===t.id);
      if(items.length===0) return '';
      return `
        <div class="section-title" style="margin-top:22px;">${t.label}</div>
        <div class="recipe-grid">${items.map(cardHtml).join('')}</div>
      `;
    }).join('');
  } else {
    content = `<div class="recipe-grid">${filtered.map(cardHtml).join('') || '<div class="empty">Aucune recette dans cette catégorie.</div>'}</div>`;
  }

  return `
    <h3>Recettes adaptées à tes objectifs</h3>
    <p style="color:var(--muted); font-size:12.5px; margin:-8px 0 18px;">Sélection indicative, à adapter à tes besoins et à l'avis d'un professionnel de santé si besoin.</p>
    <div class="chip-group" style="margin-bottom:8px;">
      <button type="button" class="chip ${filtre==='tous'?'selected':''}" data-recette-filtre="tous">Tous</button>
      ${RECIPE_TYPES.map(t=>`<button type="button" class="chip ${filtre===t.id?'selected':''}" data-recette-filtre="${t.id}">${t.label}</button>`).join('')}
    </div>
    ${content}
  `;
}

function renderClassement(u){
  if(state.leaderboardLoading){
    return `<h3>Classement de la ligue</h3><div class="empty">Chargement du classement…</div>`;
  }
  const rows = state.leaderboardData || [];
  const trs = rows.map((r,i)=>{
    const lvl = LEVELS[levelIndexForPoints(r.points)];
    const rankClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
    return `
    <tr class="${r.pseudo===u.pseudo?'me':''}">
      <td><span class="rank-num ${rankClass}">#${i+1}</span></td>
      <td>${r.pseudo}${r.pseudo===u.pseudo?' <span style="color:var(--energy); font-size:11px;">(toi)</span>':''}</td>
      <td>${lvl.name}</td>
      <td style="font-family:var(--font-mono);">${r.points}</td>
      <td>${(r.objectifs||[]).map(o=>OBJ_LABEL[o]).join(', ')}</td>
    </tr>`;
  }).join('');
  return `
    <h3>Classement de la ligue</h3>
    <p style="color:var(--muted); font-size:12.5px; margin:-8px 0 18px;">Partagé entre tous les athlètes — chaque défi validé vaut les mêmes points, quel que soit le poids.</p>
    <table class="board">
      <thead><tr><th>Rang</th><th>Athlète</th><th>Niveau</th><th>Points</th><th>Objectifs</th></tr></thead>
      <tbody>${trs || '<tr><td colspan="5" class="empty">Personne dans le classement pour l\'instant.</td></tr>'}</tbody>
    </table>
  `;
}

function renderCoachPanel(){
  const msgs = state.coachMsgs.map(m=>`<div class="msg ${m.role}">${m.text}</div>`).join('');
  return `

          <button type="button" class="chip" data-niveau="facile">Facile</button>

        <div class="chip-group" id="chipEquip">
          ${EQUIPEMENTS.map(eq=>`<button type="button" class="chip" data-equip="${eq.id}">${eq.label}</button>`).join('')}
        </div>
      </div>
    `;
    const selectedObj = new Set();
    const selectedEquip = new Set();
    document.getElementById('chipObjectifs').addEventListener('click', e=>{

      if(selectedObj.has(id)){ selectedObj.delete(id); btn.classList.remove('selected'); }

      fields.dataset.selectedObj = JSON.stringify([...selectedObj]);
    });
    document.getElementById('chipLieu').addEventListener('click', e=>{
      const btn = e.target.closest('[data-lieu]'); if(!btn) return;
      [...document.getElementById('chipLieu').children].forEach(c=>c.classList.remove('selected'));
      btn.classList.add('selected');
      fields.dataset.selectedLieu = btn.dataset.lieu;
    });
    document.getElementById('chipTemps').addEventListener('click', e=>{
      const btn = e.target.closest('[data-temps]'); if(!btn) return;
      [...document.getElementById('chipTemps').children].forEach(c=>c.classList.remove('selected'));
      btn.classList.add('selected');
      fields.dataset.selectedTemps = btn.dataset.temps;
    });
    document.getElementById('chipEquip').addEventListener('click', e=>{
      const btn = e.target.closest('[data-equip]'); if(!btn) return;
      const id = btn.dataset.equip;
      if(selectedEquip.has(id)){ selectedEquip.delete(id); btn.classList.remove('selected'); }
      else{ selectedEquip.add(id); btn.classList.add('selected'); }
      fields.dataset.selectedEquip = JSON.stringify([...selectedEquip]);
    });
    document.getElementById('chipNiveau').addEventListener('click', e=>{
      const btn = e.target.closest('[data-niveau]'); if(!btn) return;
      [...document.getElementById('chipNiveau').children].forEach(c=>c.classList.remove('selected'));
      btn.classList.add('selected');
      fields.dataset.selectedNiveau = btn.dataset.niveau;
    });
    fields.dataset.selectedObj = '[]';
    fields.dataset.selectedLieu = 'maison';
    fields.dataset.selectedTemps = '20';
    fields.dataset.selectedEquip = '[]';
    fields.dataset.selectedNiveau = 'moyen';
  }

  document.getElementById('toggleMode').addEventListener('click', ()=>{
    state.authMode = isLogin ? 'register' : 'login';
    state.authError='';
    render();
  });

  document.getElementById('btnAuth').addEventListener('click', async ()=>{
    const email = document.getElementById('fEmail').value.trim();
    const pass = document.getElementById('fPass').value;
    if(!email || !pass){ state.authError = 'Merci de remplir l\'email et le mot de passe.'; render(); return; }

    if(isLogin){
      state.authBusy = true; state.authError=''; render();
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
      if(error){ state.authBusy=false; state.authError = 'Email ou mot de passe incorrect.'; render(); return; }
      const profile = await fetchProfile(data.user.id);
      if(!profile){ state.authBusy=false; state.authError = 'Profil introuvable pour ce compte.'; render(); return; }
      state.profile = profile; state.loggedIn = true; state.authBusy=false; state.view='dashboard';
      render();
    } else {
      const pseudo = document.getElementById('fPseudo').value.trim();
      const poids = parseFloat(document.getElementById('fPoids').value);
      const age = parseInt(document.getElementById('fAge').value, 10);
      const taille = parseFloat(document.getElementById('fTaille').value);
      const objectifs = JSON.parse(fields.dataset.selectedObj || '[]');
      const lieuPref = fields.dataset.selectedLieu || 'maison';
      const tempsDispo = parseInt(fields.dataset.selectedTemps || '20', 10);
      const equipements = JSON.parse(fields.dataset.selectedEquip || '[]');
      let niveau = fields.dataset.selectedNiveau || 'moyen';
      if(!pseudo){ state.authError = 'Merci de choisir un pseudo.'; render(); return; }
      if(!poids || poids<30 || poids>300){ state.authError = 'Merci d\'indiquer un poids valide (30 à 300 kg).'; render(); return; }
      if(!age || age<12 || age>100){ state.authError = 'Merci d\'indiquer un âge valide (12 à 100 ans).'; render(); return; }
      if(!taille || taille<100 || taille>250){ state.authError = 'Merci d\'indiquer une taille valide (100 à 250 cm).'; render(); return; }
      if(objectifs.length===0){ state.authError = 'Choisis au moins un objectif.'; render(); return; }

      if(!fields.dataset.selectedNiveau){
        niveau = suggestNiveau(age, computeIMC(poids, taille));
      }

      state.authBusy = true; state.authError=''; render();

      const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });
      if(error){ state.authBusy=false; state.authError = error.message; render(); return; }
      if(!data.user){ state.authBusy=false; state.authError = 'Vérifie ta boîte mail pour confirmer ton compte, puis reviens te connecter.'; state.authMode='login'; render(); return; }

      const { error: insertErr } = await supabaseClient.from('profiles').insert({
        id: data.user.id, pseudo, poids, age, taille, niveau, objectifs, lieu_pref: lieuPref, temps_dispo: tempsDispo, equipements
      });
      if(insertErr){
        state.authBusy=false;
        state.authError = insertErr.message.includes('duplicate') ? 'Ce pseudo est déjà pris.' : insertErr.message;
        render(); return;
      }
      const profile = await fetchProfile(data.user.id);
      state.profile = profile; state.loggedIn = true; state.authBusy=false; state.view='dashboard';
      render();
    }
  });
}

/* =========================================================
   HANDLERS
   ========================================================= */
function attachHandlers(u){
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.addEventListener('click', ()=>switchTab(el.dataset.tab));
  });
  const logout = document.getElementById('btnLogout');
  if(logout) logout.addEventListener('click', async ()=>{
    stopGpsTracking(); state.gps=null;
    await supabaseClient.auth.signOut();
    state.loggedIn=false; state.profile=null; state.authMode='login'; state.coachOpen=false; state.coachMsgs=[];
    render();
  });

  document.querySelectorAll('[data-lieu]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      u.lieuPref = el.dataset.lieu;
      u.dailyDate = '';
      ensureDailyChallenge(u);
      await upsertProfile(u);
      render();
    });
  });

  document.querySelectorAll('[data-set-temps]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      u.tempsDispo = parseInt(el.dataset.setTemps, 10);
      u.dailyDate = '';
      ensureDailyChallenge(u);
      await upsertProfile(u);
      render();
    });
  });

  document.querySelectorAll('[data-set-niveau]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      u.niveau = el.dataset.setNiveau;
      await upsertProfile(u);
      render();
    });
  });

  const regen = document.getElementById('btnRegen');
  if(regen) regen.addEventListener('click', async ()=>{
    u.dailyDate=''; ensureDailyChallenge(u); await upsertProfile(u); render();
  });

  document.querySelectorAll('[data-toggle-equip]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const id = el.dataset.toggleEquip;
      u.equipements = u.equipements || [];
      const idx = u.equipements.indexOf(id);
      if(idx>=0) u.equipements.splice(idx,1); else u.equipements.push(id);
      u.dailyDate = '';
      ensureDailyChallenge(u);
      await upsertProfile(u);
      render();
    });
  });

  document.querySelectorAll('[data-swap]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const oldId = el.dataset.swap;
      const pool = eligiblePool(u).filter(e => !u.dailyExercises.includes(e.id));
      if(pool.length===0){ showToast('Pas d\'autre exercice disponible avec ton équipement actuel.'); return; }
      const replacement = pool[Math.floor(Math.random()*pool.length)];
      const i = u.dailyExercises.indexOf(oldId);
      if(i>=0) u.dailyExercises[i] = replacement.id;
      await upsertProfile(u);
      render();
    });
  });

  document.querySelectorAll('[data-validate]').forEach(el=>{
    el.addEventListener('click', ()=>{ openCoachForValidation(el.dataset.validate); });
  });

  document.querySelectorAll('[data-gps-start]').forEach(el=>{
    el.addEventListener('click', ()=>{ startGpsTracking(el.dataset.gpsStart); });
  });
  const btnCancelGps = document.getElementById('btnCancelGps');
  if(btnCancelGps) btnCancelGps.addEventListener('click', cancelGpsTracking);
  const btnFinishGps = document.getElementById('btnFinishGps');
  if(btnFinishGps) btnFinishGps.addEventListener('click', finishGpsTracking);

  const btnOpenBonus = document.getElementById('btnOpenBonus');
  if(btnOpenBonus) btnOpenBonus.addEventListener('click', ()=>{
    state.bonusPickerOpen = true;
    render();
  });

  document.querySelectorAll('[data-add-bonus]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const exId = el.dataset.addBonus;
      if(!u.dailyExercises.includes(exId)) u.dailyExercises.push(exId);
      state.bonusPickerOpen = false;
      await upsertProfile(u);
      render();
    });
  });

  document.querySelectorAll('[data-recette-filtre]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.recetteFiltre = el.dataset.recetteFiltre;
      render();
    });
  });

  const fab = document.getElementById('coachFab');
  if(fab) fab.addEventListener('click', ()=>{
    state.coachOpen = !state.coachOpen;
    if(state.coachOpen && state.coachMsgs.length===0){
      state.coachMsgs.push({role:'coach', text:'Salut ' + u.pseudo + ' 👋 Je suis ton coach. Dis-moi comment se passe ton entraînement, ou clique sur "Terminé" à côté d\'un défi pour que je le valide avec toi.'});
    }
    render();
  });
  const coachClose = document.getElementById('coachClose');
  if(coachClose) coachClose.addEventListener('click', ()=>{ state.coachOpen=false; render(); });

  const send = document.getElementById('coachSend');
  const input = document.getElementById('coachInput');
  if(send && input){
    const doSend = ()=>{ const v=input.value.trim(); if(v) sendToCoach(v); };
    send.addEventListener('click', doSend);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') doSend(); });
    input.focus();
    const msgsEl = document.getElementById('coachMsgs');
    if(msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
  }
}

async function switchTab(tab){
  state.view = tab;
  if(tab==='classement'){
    state.leaderboardLoading = true;
    render();
    state.leaderboardData = await fetchLeaderboard();
    state.leaderboardLoading = false;
  }
  render();
}

function openCoachForValidation(exId, autoMsg){
  const u = me();
  const ex = EXERCISES.find(e=>e.id===exId);
  const last = u.cooldowns[exId] || 0;
  const now = Date.now();
  if(now - last < 4*60*60*1000){
    showToast('Tu as déjà validé cet exercice récemment. Reviens un peu plus tard 💪');
    return;
  }
  state.coachOpen = true;
  state.coachExercice = exId;
  state.coachMsgs.push({role:'sys', text:'Validation de : '+ex.nom});
  if(autoMsg){
    render();
    sendToCoach(autoMsg);
  } else {
    state.coachMsgs.push({role:'coach', text:'D\'accord, on valide ton défi "'+ex.nom+'" ensemble. Raconte-moi comment ça s\'est passé : combien de temps ça t\'a pris, et comment tu t\'es senti à la fin ?'});
    render();
  }
}

/* =========================================================
   SUIVI GPS EN DIRECT (distance, vitesse, feedback)
   ========================================================= */
const MET_VALUES = { course:9.8, velo:7.5, marche_rapide:4.3 };

function startGpsTracking(exId){
  if(!navigator.geolocation){
    showToast('La géolocalisation n\'est pas disponible sur cet appareil.');
    return;
  }
  if(typeof Notification !== 'undefined' && Notification.permission==='default'){
    Notification.requestPermission();
  }
  state.gps = {
    exId, distanceKm:0, startTime:Date.now(), lastPos:null, speedKmh:0, kcal:0,
    message:'Démarrage du suivi GPS…'
  };
  state.gpsWatchId = navigator.geolocation.watchPosition(pos=>{
    const g = state.gps;
    if(!g) return;
    const { latitude, longitude, speed } = pos.coords;
    if(g.lastPos){
      const d = haversineKm(g.lastPos.lat, g.lastPos.lon, latitude, longitude);
      if(d > 0.002) g.distanceKm += d;
    }
    g.lastPos = { lat:latitude, lon:longitude };
    g.speedKmh = (speed!=null && speed>=0) ? speed*3.6 : g.speedKmh;
    updateGpsFeedback();
    render();
  }, err=>{
    if(err.code === 1){ // PERMISSION_DENIED
      showToast('Géolocalisation refusée — impossible de démarrer le suivi GPS.');
      cancelGpsTracking();
    } else {
      showToast('Signal GPS momentanément perdu, ça va reprendre…');
    }
  }, { enableHighAccuracy:true, maximumAge:1000, timeout:15000 });

  state.gpsNotifTimer = setInterval(()=>{
    if(!state.gps) return;
    notifyGps(state.gps.message);
  }, 60000);
  state.gpsTickTimer = setInterval(()=>{ if(state.gps) render(); }, 5000);
  render();
}

function updateGpsFeedback(){
  const u = me();
  const g = state.gps;
  if(!g) return;
  const ex = EXERCISES.find(e=>e.id===g.exId);
  const elapsedHours = (Date.now()-g.startTime)/3600000;
  const elapsedMin = elapsedHours*60;
  const met = MET_VALUES[g.exId] || 7;
  g.kcal = Math.round(met * u.poids * elapsedHours);
  const allowedMin = adjustTimeAllowed(ex.baseTimeMin, u.poids, u);
  const targetPace = allowedMin / ex.base;
  const currentPace = g.distanceKm>0.05 ? elapsedMin / g.distanceKm : null;
  if(currentPace==null){
    g.message = 'C\'est parti ! Continue, les premières minutes comptent aussi.';
  } else if(currentPace <= targetPace*0.92){
    g.message = '🔥 Excellent rythme, tu es en avance sur ton objectif !';
  } else if(currentPace <= targetPace*1.1){
    g.message = '👍 Bon rythme, garde exactement ça jusqu\'au bout !';
  } else {
    g.message = '⚡ Accélère un peu, ton rythme actuel est en dessous de l\'objectif.';
  }
}

function notifyGps(msg){
  if(typeof Notification !== 'undefined' && Notification.permission==='granted'){
    try{ new Notification('MAÎTRISE — Coach GPS', { body: msg }); }catch(e){}
  }
}

function stopGpsTracking(){
  if(state.gpsWatchId!=null && navigator.geolocation){ navigator.geolocation.clearWatch(state.gpsWatchId); }
  if(state.gpsNotifTimer) clearInterval(state.gpsNotifTimer);
  if(state.gpsTickTimer) clearInterval(state.gpsTickTimer);
  state.gpsWatchId=null; state.gpsNotifTimer=null; state.gpsTickTimer=null;
}

function cancelGpsTracking(){
  stopGpsTracking();
  state.gps = null;
  render();
}

function finishGpsTracking(){
  const g = state.gps;
  if(!g) return;
  const exId = g.exId;
  const distanceStr = g.distanceKm.toFixed(2);
  const elapsedMin = ((Date.now()-g.startTime)/60000).toFixed(1);
  const avgSpeed = g.distanceKm>0 ? (g.distanceKm/((Date.now()-g.startTime)/3600000)).toFixed(1) : '0';
  const kcalStr = g.kcal || 0;
  stopGpsTracking();
  state.gps = null;
  openCoachForValidation(exId, `J'ai suivi mon parcours en direct avec le GPS : ${distanceStr} km parcourus en ${elapsedMin} minutes, vitesse moyenne ${avgSpeed} km/h, environ ${kcalStr} kcal dépensées.`);
}

function renderGpsPanel(){
  const g = state.gps;
  if(!g) return '';
  const ex = EXERCISES.find(e=>e.id===g.exId);
  const elapsedMin = (Date.now()-g.startTime)/60000;
  const elapsedStr = elapsedMin<1 ? Math.round(elapsedMin*60)+' s' : elapsedMin.toFixed(1)+' min';
  return `
  <div class="gps-panel">
    <div class="gps-head">
      <h4>${ex ? ex.nom : 'Suivi GPS'}</h4>
      <span style="font-size:10.5px; color:var(--muscle); text-transform:uppercase; letter-spacing:1px;">● en direct</span>
    </div>
    <div class="gps-stats-row">
      <div class="gps-stat"><div class="big">${g.distanceKm.toFixed(2)}</div><div class="label">km</div></div>
      <div class="gps-stat"><div class="big">${g.speedKmh.toFixed(1)}</div><div class="label">km/h</div></div>
      <div class="gps-stat"><div class="big">${elapsedStr}</div><div class="label">temps</div></div>
    </div>
    <div class="gps-stats-row">
      <div class="gps-stat" style="flex:1;"><div class="big">${g.kcal||0}</div><div class="label">kcal dépensées</div></div>
    </div>
    <div class="gps-message">${g.message||''}</div>
    <div class="gps-actions">
      <button class="btn-small" id="btnCancelGps" style="flex:1;">Annuler</button>
      <button class="btn-small go" id="btnFinishGps" style="flex:1;">Terminer →</button>
    </div>
  </div>`;
}

async function sendToCoach(text){
  const u = me();
  state.coachMsgs.push({role:'user', text});
  const inputEl = document.getElementById('coachInput');
  if(inputEl) inputEl.value='';
  state.coachBusy = true;
  render();

  const lvl = LEVELS[levelIndexForPoints(u.points)];
  const exContext = state.coachExercice ? EXERCISES.find(e=>e.id===state.coachExercice) : null;

  const systemPrompt = `Tu es "Coach", un coach sportif motivant et bienveillant intégré à une application française de fitness gamifiée nommée MAÎTRISE.
Contexte de l'athlète : pseudo ${u.pseudo}, poids ${u.poids} kg, objectifs : ${u.objectifs.map(o=>OBJ_LABEL[o]).join(', ')}, rang actuel : ${lvl.name}, points : ${u.points}.
${exContext ? `L'athlète est en train de faire valider l'exercice "${exContext.nom}" (cible ajustée à son poids : ${computeTarget(exContext, u.poids, u).display}).` : `Aucun exercice n'est en cours de validation, discute librement (motivation, conseils, nutrition liée à ses objectifs).`}

Ton rôle :
1. Sois chaleureux, direct, jamais moralisateur. Tutoiement.
2. Si un exercice est en cours de validation : pose UNE OU DEUX questions de vérification courtes et pertinentes (ressenti, durée, difficulté perçue) avant de valider. Si les réponses sont cohérentes et plausibles, félicite et termine ta réponse par le token exact [VALIDATION:OK] sur une ligne séparée. Si les réponses sont manifestement incohérentes, reste bienveillant mais ne valide pas, repose une question, sans token.
3. Si aucun exercice n'est en cours, donne des conseils de motivation, d'entraînement ou de nutrition liés à ses objectifs, sans jamais insérer le token [VALIDATION:OK].
4. Reste concis (3-5 phrases maximum).
5. Ne donne jamais de conseil médical précis ; encourage à consulter un professionnel de santé pour toute question médicale.`;

  const history = state.coachMsgs.filter(m=>m.role==='coach'||m.role==='user').map(m=>({
    role: m.role==='coach' ? 'assistant' : 'user',
    content: m.text
  }));

  try{
    const response = await fetch('/api/coach', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: systemPrompt, messages: history })
    });
    const data = await response.json();
    let reply = data.text || data.error || 'Désolé, je n\'ai pas pu répondre. Réessaie.';

    let validated = false;
    const validationRegex = /\[?VALIDATION\s*:\s*OK\]?/i;
    if(validationRegex.test(reply)){
      validated = true;
      reply = reply.replace(validationRegex,'').trim();
    }
    state.coachMsgs.push({role:'coach', text:reply});

    if(validated && state.coachExercice){
      const exId = state.coachExercice;
      u.doneToday[exId] = true;
      u.points += 20;
      u.totalValidations = (u.totalValidations||0) + 1;
      u.cooldowns[exId] = Date.now();
      state.coachExercice = null;
      await upsertProfile(u);
      state.coachMsgs.push({role:'sys', text:'+20 points crédités ✅'});
    }
  }catch(e){
    state.coachMsgs.push({role:'coach', text:'Petit souci de connexion avec le coach, réessaie dans un instant.'});
  }
  state.coachBusy = false;
  render();
}

/* =========================================================
   BOOT
   ========================================================= */
(async function boot(){
  const { data:{ session } } = await supabaseClient.auth.getSession();
  if(session){
    const profile = await fetchProfile(session.user.id);
    if(profile){ state.profile = profile; state.loggedIn = true; }
  }
  render();
})();
</script>
